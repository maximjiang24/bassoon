<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1A1A1A"/>
  <g stroke="#b07d2e" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Main body: two parallel tubes, SW→NE diagonal -->
    <line x1="7"  y1="27" x2="26" y2="8"  stroke-width="2.6"/>
    <line x1="10" y1="29" x2="29" y2="10" stroke-width="2.6"/>
    <!-- Bell cap top-right -->
    <rect x="24" y="5" width="6" height="4" rx="1"
          transform="rotate(-45 27 7)" stroke-width="1.8" fill="#b07d2e"/>
    <!-- Boot joint bottom-left (U-curve connecting tubes) -->
    <path d="M5 26 Q3 31 10 30" stroke-width="2.2"/>
    <!-- Bocal: S-curve out of mid-body to the left -->
    <path d="M14 20 Q9 22 7 18 Q5 14 9 12" stroke-width="1.6"/>
    <!-- Bocal end cap -->
    <line x1="7" y1="11" x2="11" y2="9" stroke-width="2.4"/>
    <!-- Tone holes -->
    <circle cx="17" cy="19" r="1.4" stroke-width="1.4"/>
    <circle cx="20" cy="16" r="1.4" stroke-width="1.4"/>
    <circle cx="23" cy="13" r="1.4" stroke-width="1.4"/>
  </g>
</svg>
